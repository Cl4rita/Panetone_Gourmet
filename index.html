<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="index.js" defer></script>
    <title>Panetone Gourmet</title>
</head>
<body>
    <div class="header">  
        Panetone Gourmet  
    </div>  

    <div class="calculator-container">   
        <div class="form-group">  
            <label for="quantidade">Quantidade:</label>  
            <input type="number" id="quantidade" name="quantidade">  
        </div>  
        <div class="form-group"> 
            <p>Massa em g:</p> 
            <select id="raioSelector">
                <option value="">Selecione uma Massa:</option>  
                <option value="180">180g</option>  
                <option value="440">440g</option>  
                <option value="700">700g</option>  
            </select>  
        </div>  
        <div class="form-group"> 
            <p>Raio:</p> 
            <select id="raioSelector">
                <option value="">Selecione o Raio:</option>  
                <option value="4">4</option>  
                <option value="5">5</option>  
                <option value="10">10</option>  
            </select>  
        </div>  
        <div class="form-group"> 
            <p>Raio:</p> 
            <select id="alturaSelector">
                <option value="">Selecione a Altura:</option>  
                <option value="5">5</option>  
                <option value="8">8</option>  
                <option value="3.2">3.2</option>  
            </select>  
        </div>  
        <button id="calcular">Calcular</button>  
    </div>  

    <div class="result-container">  
        <h2>Resultado</h2>  
        <div id="res"></div>
    </div>  

    <div class="footer">  
        Scrumaster: Ana Clara<br>  
        Develops: Helena, Manuela e Agatha  
    </div>  
</body>
</html>
